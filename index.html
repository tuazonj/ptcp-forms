<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Pagbangon Training Center Philippines (PTCP) - Official Enrollment Form</title>
<meta name="description" content="Official online enrollment form for Pagbangon Training Center Philippines (PTCP), a TESDA-accredited training institution in Santa Maria, Bulacan.">
<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
<style>
  :root{
    --navy:#122B7A;
    --navy-dark:#0B1E57;
    --gold:#D9A62E;
    --paper:#F7F8FB;
    --ink:#1B1F2A;
    --line:#D8DEEC;
    --ok:#1E7A46;
    --err:#B3261E;
    --white:#ffffff;
  }
  *{box-sizing:border-box;}
  body{margin:0;font-family:Georgia,'Times New Roman',serif;background:var(--paper);color:var(--ink);}
  .sans{font-family:Arial,Helvetica,sans-serif;}
  h1,h2,h3{font-family:Georgia,'Times New Roman',serif;margin:0 0 8px 0;}
  a{color:var(--navy);}
  .header-banner-new{width:100%;background:var(--white);border-bottom:4px solid var(--gold);display:flex;align-items:center;justify-content:center;gap:18px;padding:14px 20px;}
  .header-logo{height:64px;width:auto;flex-shrink:0;}
  .header-text{text-align:center;}
  .header-eyebrow{font-family:Arial,sans-serif;letter-spacing:.14em;text-transform:uppercase;font-size:11px;color:var(--gold);font-weight:700;}
  .header-title{font-family:Georgia,'Times New Roman',serif;font-size:20px;font-weight:700;color:var(--navy);line-height:1.2;}
  .header-sub{font-family:Arial,sans-serif;font-size:12px;color:#5a6379;margin-top:2px;}
  @media (max-width:600px){
    .header-banner-new{gap:10px;padding:10px 12px;}
    .header-logo{height:44px;}
    .header-title{font-size:15px;}
    .header-sub{font-size:10.5px;}
    .header-eyebrow{font-size:9.5px;}
  }
  .shell{max-width:820px;margin:0 auto;padding:24px 18px 60px;}
  .top-actions{display:flex;justify-content:flex-end;gap:10px;max-width:820px;margin:10px auto 0;padding:0 18px;font-family:Arial,sans-serif;font-size:13px;}
  .top-actions button{background:none;border:1px solid var(--navy);color:var(--navy);padding:6px 12px;border-radius:6px;cursor:pointer;font-size:12.5px;}
  .top-actions button:hover{background:var(--navy);color:#fff;}
  .card{background:#fff;border:1px solid var(--line);border-radius:10px;padding:28px 26px;margin-bottom:18px;box-shadow:0 2px 10px rgba(18,43,122,0.05);}
  .eyebrow{font-family:Arial,sans-serif;letter-spacing:.14em;text-transform:uppercase;font-size:11.5px;color:var(--gold);font-weight:700;margin-bottom:6px;}
  .lead{font-family:Arial,sans-serif;font-size:14.5px;line-height:1.6;color:#3a4257;}
  .notice{background:#EEF1FB;border-left:4px solid var(--navy);padding:14px 16px;border-radius:6px;font-family:Arial,sans-serif;font-size:13.5px;line-height:1.6;margin:16px 0;color:#243056;}
  .progress-wrap{max-width:820px;margin:0 auto;padding:6px 18px 0;font-family:Arial,sans-serif;}
  .progress-bar{height:6px;background:#E2E6F2;border-radius:4px;overflow:hidden;}
  .progress-fill{height:100%;background:linear-gradient(90deg,var(--navy),var(--gold));transition:width .3s ease;}
  .progress-label{font-size:12px;color:#5a6379;margin:6px 0 0;text-align:right;}
  label{display:block;font-family:Arial,sans-serif;font-size:13.5px;font-weight:700;color:#1c2440;margin:16px 0 6px;}
  label .req{color:var(--err);}
  .field-hint{font-family:Arial,sans-serif;font-size:12px;color:#6a7288;margin-top:-2px;margin-bottom:6px;}
  input[type=text],input[type=tel],input[type=date],input[type=password],select,textarea{
    width:100%;padding:10px 12px;border:1px solid #C7CEE0;border-radius:7px;font-size:14px;font-family:Arial,sans-serif;background:#fff;color:var(--ink);
  }
  input:focus,select:focus,textarea:focus{outline:2px solid var(--navy);outline-offset:1px;border-color:var(--navy);}
  .radio-row,.check-row{display:flex;align-items:center;gap:8px;padding:8px 10px;border:1px solid #E1E5F0;border-radius:7px;margin-bottom:8px;font-family:Arial,sans-serif;font-size:14px;cursor:pointer;}
  .radio-row:hover,.check-row:hover{background:#F4F6FC;}
  .radio-row input,.check-row input{width:auto;margin:0;}
  .otherbox{margin-top:8px;}
  .file-drop{border:2px dashed #C7CEE0;border-radius:9px;padding:18px;text-align:center;font-family:Arial,sans-serif;font-size:13px;color:#5a6379;background:#FAFBFE;}
  .file-drop.has-file{border-color:var(--ok);background:#F1F9F3;color:var(--ok);}
  .file-drop input{display:block;margin:10px auto 0;}
  .btn-row{display:flex;justify-content:space-between;gap:10px;margin-top:26px;font-family:Arial,sans-serif;}
  .btn{padding:11px 22px;border-radius:8px;font-size:14px;font-weight:700;cursor:pointer;border:none;font-family:Arial,sans-serif;}
  .btn-primary{background:var(--navy);color:#fff;}
  .btn-primary:hover{background:var(--navy-dark);}
  .btn-ghost{background:none;border:1px solid #C7CEE0;color:#3a4257;}
  .btn-ghost:hover{background:#F0F2F8;}
  .btn-danger{background:var(--err);color:#fff;}
  .btn-gold{background:var(--gold);color:#3a2b06;}
  .err-text{color:var(--err);font-family:Arial,sans-serif;font-size:12.5px;margin-top:4px;}
  .autosave-note{text-align:center;font-family:Arial,sans-serif;font-size:11.5px;color:#8a90a3;margin-top:14px;}
  .landing-choices{display:grid;grid-template-columns:1fr 1fr;gap:16px;margin-top:20px;}
  @media (max-width:600px){.landing-choices{grid-template-columns:1fr;}}
  .choice-card{border:1px solid var(--line);border-radius:10px;padding:20px;text-align:center;cursor:pointer;background:#fff;transition:transform .15s ease, box-shadow .15s ease;}
  .choice-card:hover{transform:translateY(-3px);box-shadow:0 8px 20px rgba(18,43,122,0.12);}
  .choice-card h3{color:var(--navy);}
  .choice-card p{font-family:Arial,sans-serif;font-size:13px;color:#5a6379;}
  .batch-pill{display:inline-block;background:var(--navy);color:#fff;font-family:Arial,sans-serif;font-size:12px;padding:4px 12px;border-radius:20px;margin-bottom:10px;}
  .full-pill{background:var(--err);}
  table.data-table{width:100%;border-collapse:collapse;font-family:Arial,sans-serif;font-size:12.5px;background:#fff;}
  table.data-table th{background:var(--navy);color:#fff;padding:8px 10px;text-align:left;position:sticky;top:0;}
  table.data-table td{padding:8px 10px;border-bottom:1px solid #eef0f6;}
  table.data-table tr:hover td{background:#F4F6FC;}
  .table-wrap{overflow:auto;max-height:520px;border:1px solid var(--line);border-radius:8px;}
  .toolbar{display:flex;flex-wrap:wrap;gap:10px;align-items:center;margin-bottom:14px;font-family:Arial,sans-serif;}
  .toolbar select,.toolbar input{padding:8px 10px;border:1px solid #C7CEE0;border-radius:7px;font-size:13px;}
  .tag{display:inline-block;background:#EEF1FB;color:var(--navy);font-size:11px;padding:2px 8px;border-radius:12px;font-family:Arial,sans-serif;font-weight:700;}
  .qa-row{padding:10px 0;border-bottom:1px solid #eef0f6;font-family:Arial,sans-serif;}
  .qa-q{font-size:12px;color:#6a7288;text-transform:uppercase;letter-spacing:.04em;font-weight:700;}
  .qa-a{font-size:14.5px;color:var(--ink);margin-top:2px;}
  .qa-a img{max-width:220px;border-radius:6px;border:1px solid var(--line);margin-top:6px;display:block;}
  .modal-bg{position:fixed;inset:0;background:rgba(11,30,87,0.55);display:flex;align-items:center;justify-content:center;z-index:50;padding:20px;}
  .modal{background:#fff;border-radius:10px;max-width:640px;width:100%;max-height:88vh;overflow:auto;padding:26px;}
  .link-btn{background:none;border:none;color:var(--navy);text-decoration:underline;cursor:pointer;font-family:Arial,sans-serif;font-size:13px;padding:0;}
  .icon-btn{background:none;border:1px solid #C7CEE0;border-radius:6px;padding:5px 9px;cursor:pointer;font-size:12px;font-family:Arial,sans-serif;}
  .icon-btn.danger{border-color:var(--err);color:var(--err);}
  .icon-btn:hover{background:#F0F2F8;}
  .stat-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(140px,1fr));gap:12px;margin-bottom:18px;}
  .stat-box{background:#fff;border:1px solid var(--line);border-radius:9px;padding:14px;font-family:Arial,sans-serif;}
  .stat-box .num{font-size:24px;font-weight:800;color:var(--navy);font-family:Georgia,serif;}
  .stat-box .lbl{font-size:11.5px;color:#6a7288;text-transform:uppercase;letter-spacing:.04em;}
  .toast{position:fixed;bottom:20px;left:50%;transform:translateX(-50%);background:var(--navy-dark);color:#fff;padding:10px 20px;border-radius:8px;font-family:Arial,sans-serif;font-size:13px;z-index:99;box-shadow:0 6px 20px rgba(0,0,0,.2);}
  .center-note{text-align:center;font-family:Arial,sans-serif;color:#6a7288;font-size:13px;padding:30px 0;}
  @media print{
    .no-print{display:none !important;}
    body{background:#fff;}
    .card{box-shadow:none;border:none;padding:0;}
    .shell{max-width:100%;padding:0;}
  }
</style>
</head>

/* ========================= STORAGE HELPERS ========================= */
async function safeGet(key, shared){
  try{ const r = await window.storage.get(key, shared); return r ? r.value : null; }
  catch(e){ return null; }
}
async function safeSet(key, value, shared){
  try{ await window.storage.set(key, value, shared); return true; }
  catch(e){ console.error('storage set failed', e); return false; }
}
async function safeDelete(key, shared){
  try{ await window.storage.delete(key, shared); return {ok:true}; }
  catch(e){ return {ok:false, error: (e && e.message) ? e.message : String(e)}; }
}
async function safeList(prefix, shared){
  try{ const r = await window.storage.list(prefix, shared); return r ? r.keys : []; }
  catch(e){ return []; }
}

async function getMeta(){
  const raw = await safeGet('meta:currentBatch', true);
  if(!raw){
    const init = {batch: STARTING_BATCH, count:0};
    await safeSet('meta:currentBatch', JSON.stringify(init), true);
    return init;
  }
  try{ return JSON.parse(raw); }catch(e){ return {batch:STARTING_BATCH,count:0}; }
}
async function saveMeta(meta){
  await safeSet('meta:currentBatch', JSON.stringify(meta), true);
}

async function loadDraft(){
  const raw = await safeGet('draft:current', false);
  if(!raw) return null;
  try{ return JSON.parse(raw); }catch(e){ return null; }
}
function queueAutosave(){
  clearTimeout(saveTimer);
  saveTimer = setTimeout(async ()=>{
    await safeSet('draft:current', JSON.stringify(formData), false);
    showAutosaveTick();
  }, 700);
}
function showAutosaveTick(){
  const el = document.getElementById('autosave-tick');
  if(el){ el.textContent = 'Saved ' + new Date().toLocaleTimeString(); }
}
async function clearDraft(){
  await safeDelete('draft:current', false);
}

async function listAllEntries(){
  const keys = await safeList('entry:', true);
  const out = [];
  for(const k of keys){
    const raw = await safeGet(k, true);
    if(raw){ try{ out.push(JSON.parse(raw)); }catch(e){} }
  }
  out.sort((a,b)=> (b.submittedAt||'').localeCompare(a.submittedAt||''));
  return out;
}
async function saveEntryRecord(entry){
  await safeSet('entry:'+entry.id, JSON.stringify(entry), true);
}
async function deleteEntryRecord(id){
  return await safeDelete('entry:'+id, true);
}

function genId(){ return 'e' + Date.now() + Math.random().toString(36).slice(2,8); }
function esc(s){ return (s==null?'':String(s)).replace(/[&<>"']/g, c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c])); }

function fileToCompressedDataURL(file, maxDim, quality){
  return new Promise((resolve, reject)=>{
    if(!file) return reject('no file');
    const reader = new FileReader();
    reader.onload = function(e){
      const img = new Image();
      img.onload = function(){
        let w = img.width, h = img.height;
        if(w > maxDim || h > maxDim){
          if(w > h){ h = Math.round(h * maxDim / w); w = maxDim; }
          else{ w = Math.round(w * maxDim / h); h = maxDim; }
        }
        const canvas = document.createElement('canvas');
        canvas.width = w; canvas.height = h;
        const ctx = canvas.getContext('2d');
        ctx.fillStyle = '#fff'; ctx.fillRect(0,0,w,h);
        ctx.drawImage(img,0,0,w,h);
        resolve(canvas.toDataURL('image/jpeg', quality));
      };
      img.onerror = reject;
      img.src = e.target.result;
    };
    reader.onerror = reject;
    if(file.type === 'application/pdf'){
      // can't rasterize PDF client-side without extra libs; store as-is if small, else reject
      const r2 = new FileReader();
      r2.onload = ev => resolve(ev.target.result);
      r2.onerror = reject;
      r2.readAsDataURL(file);
    } else {
      reader.readAsDataURL(file);
    }
  });
}

function toast(msg){
  let t = document.getElementById('app-toast');
  if(t) t.remove();
  t = document.createElement('div');
  t.id = 'app-toast'; t.className = 'toast'; t.textContent = msg;
  document.body.appendChild(t);
  setTimeout(()=>{ if(t) t.remove(); }, 2600);
}

function appConfirm(message, okLabel, cancelLabel){
  return new Promise((resolve)=>{
    const bg = document.createElement('div');
    bg.className = 'modal-bg';
    bg.innerHTML = `
      <div class="modal" style="max-width:380px;text-align:center;">
        <p class="lead" style="font-size:15px;">${esc(message)}</p>
        <div class="btn-row" style="justify-content:center;">
          <button class="btn btn-ghost" id="app-confirm-cancel">${esc(cancelLabel||'Cancel')}</button>
          <button class="btn btn-danger" id="app-confirm-ok">${esc(okLabel||'Confirm')}</button>
        </div>
      </div>`;
    document.body.appendChild(bg);
    const cleanup = (val)=>{ bg.remove(); resolve(val); };
    bg.querySelector('#app-confirm-ok').onclick = ()=> cleanup(true);
    bg.querySelector('#app-confirm-cancel').onclick = ()=> cleanup(false);
    bg.addEventListener('click', (e)=>{ if(e.target === bg) cleanup(false); });
  });
}

  attachHandlers();
}

function stepIndexFor(key){ return STEP_ORDER.indexOf(key); }
function visibleSteps(){
  return STEP_ORDER.filter(k => !(k==='priorNC' && formData.hasNC !== 'Yes'));
}
function nextStepKey(key){
  const vis = visibleSteps();
  const idx = vis.indexOf(key);
  return idx < vis.length-1 ? vis[idx+1] : null;
}
function prevStepKey(key){
  const vis = visibleSteps();
  const idx = vis.indexOf(key);
  return idx > 0 ? vis[idx-1] : null;
}

function renderFormShell(){
  const vis = visibleSteps();
  const idx = vis.indexOf(currentStepKey);
  const pct = Math.round(((idx+1)/vis.length)*100);
  return `
  ${headerBanner()}
  <div class="progress-wrap no-print">
    <div class="progress-bar"><div class="progress-fill" style="width:${pct}%"></div></div>
    <div class="progress-label">Step ${idx+1} of ${vis.length}</div>
  </div>
  <div class="shell">
    <div class="card">

}

/* ========================= VALIDATION ========================= */
function validateStep(key){
  errors = {};
  if(key==='privacy'){
    if(!formData.privacyAgree) errors.privacyAgree = 'You must agree to the Data Privacy Notice to continue.';
  }
  if(key==='personal'){
    if(!formData.fullName) errors.fullName = 'This field is required.';
    if(!formData.dob) errors.dob = 'This field is required.';
    if(!formData.address) errors.address = 'This field is required.';
    if(!formData.contact) errors.contact = 'This field is required.';
    if(!formData.sex) errors.sex = 'Please select an option.';
    if(!formData.civilStatus) errors.civilStatus = 'Please select an option.';
    if(!formData.nationality) errors.nationality = 'Please select an option.';
    if(formData.nationality==='Other' && !formData.nationalityOther) errors.nationality = 'Please specify your nationality.';
    if(!formData.religion) errors.religion = 'Please select an option.';
    if(formData.religion==='Other' && !formData.religionOther) errors.religion = 'Please specify your religion.';
  }
  if(key==='education'){
    if(!formData.education) errors.education = 'Please select an option.';
    if(!formData.hasNC) errors.hasNC = 'Please select an option.';
  }
  if(key==='priorNC'){
    if(!formData.ncProgram1) errors.ncProgram1 = 'This field is required.';
  }
  if(key==='program'){
    if(!formData.program) errors.program = 'Please select a program.';
    if(!formData.howLearned) errors.howLearned = 'Please select an option.';
    if(formData.howLearned==='Other' && !formData.howLearnedOther) errors.howLearned = 'Please specify.';
  }
  if(key==='uploads'){
    if(!formData.idType) errors.idType = 'Please select an ID type.';
    if(!formData.idFile) errors.idFile = 'Please upload your valid ID.';
    if(!formData.photoFile) errors.photoFile = 'Please upload your 2x2 picture.';
  }
  if(key==='payment'){
    if(!formData.paymentFile) errors.paymentFile = 'Please upload proof of payment.';
  }
  if(key==='consent'){
    if(!formData.certify) errors.certify = 'You must certify to submit.';
    if(!formData.signatureFile) errors.signatureFile = 'Please upload your signature.';
  }
  return Object.keys(errors).length === 0;
}

        <div class="stat-box"><div class="num">${staffMeta.count}/${BATCH_SIZE}</div><div class="lbl">Current Batch Slots Filled</div></div>
        <div class="stat-box"><div class="num">${batches.length}</div><div class="lbl">Total Batches</div></div>
      </div>
      <div class="toolbar">
        <select id="staff-batch-filter">
          <option value="all">All Batches</option>
          ${batches.map(b=>`<option value="${b}" ${String(staffFilterBatch)===String(b)?'selected':''}>Batch ${b}</option>`).join('')}
        </select>
        <input type="text" id="staff-search" placeholder="Search name or program..." value="${esc(staffSearch)}"/>
        <button class="btn btn-ghost" id="btn-export-excel">Export to Excel</button>
        <button class="btn btn-ghost" id="btn-refresh">Refresh</button>
      </div>
      <div class="table-wrap">
        <table class="data-table">
          <thead><tr>
            <th>Batch</th><th>Full Name</th><th>Contact</th><th>Sex</th><th>Program</th><th>Submitted</th><th>Actions</th>
          </tr></thead>
          <tbody>
            ${filtered.map(e=>`
              <tr>
                <td><span class="tag">B${e.batch}</span></td>
                <td>${esc(e.fullName)}</td>
                <td>${esc(e.contact)}</td>
                <td>${esc(e.sex)}</td>
                <td>${esc(e.program)}</td>
                <td>${esc(new Date(e.submittedAt).toLocaleDateString())}</td>
                <td>
                  <button class="icon-btn" data-view="${e.id}">View</button>
                  <button class="icon-btn danger" data-delete="${e.id}">Delete</button>
                </td>
              </tr>`).join('') || `<tr><td colspan="7" class="center-note">No enrollment records yet.</td></tr>`}
          </tbody>
        </table>
      </div>
    </div>
  </div>`;
}

/* ========================= HANDLERS ========================= */
function setField(key, val){
  formData[key] = val;
  queueAutosave();
}

async function goToStep(key){
  currentStepKey = key;
  errors = {};
  render();
  window.scrollTo(0,0);
}

let isSubmitting = false;

async function handleNext(){
  collectCurrentStepInputs();
  if(!validateStep(currentStepKey)){ render(); return; }
  if(currentStepKey === 'consent'){
    if(isSubmitting) return;
    isSubmitting = true;
    const nextBtnEl = document.getElementById('btn-next');
    if(nextBtnEl){ nextBtnEl.disabled = true; nextBtnEl.textContent = 'Submitting...'; nextBtnEl.style.opacity = '0.6'; }
    try{
      await submitForm();
    } finally {
      isSubmitting = false;
    }
    return;
  }
  const nk = nextStepKey(currentStepKey);
  if(nk) goToStep(nk);
}
function handleBack(){
  collectCurrentStepInputs();
  const pk = prevStepKey(currentStepKey);
  if(pk) goToStep(pk);
}

function collectCurrentStepInputs(){
  // radios & checkboxes already handled via change events; text/textarea/select captured on input already.
  // This function exists as a safety net for fields not yet flushed.
}

async function submitForm(){
  const meta = await getMeta();
  let batch = meta.batch, count = meta.count;
  if(count >= BATCH_SIZE){ batch += 1; count = 0; }
  const entry = Object.assign({}, formData, {
    id: genId(),
    batch: batch,
    submittedAt: new Date().toISOString()
  });
  const sizeCheck = JSON.stringify(entry).length;
  if(sizeCheck > 4500000){
    toast('One of your files is too large. Please re-upload a smaller image and try again.');
    return;
  }
  await saveEntryRecord(entry);
  count += 1;
  await saveMeta({batch: batch, count: count});
  await clearDraft();
  lastSubmittedEntry = entry;
  formData = {};
  currentStepKey = 'privacy';
  currentView = 'thankyou';
  render();
  window.scrollTo(0,0);
}

async function handleFileUpload(fieldKey, file){
  if(!file) return;
  try{
    const isSignatureLike = false;
    const dataUrl = await fileToCompressedDataURL(file, 900, 0.6);
    formData[fieldKey] = dataUrl;
    queueAutosave();
    render();
  }catch(e){
    toast('Could not read that file. Please try a JPG, PNG, or PDF.');
  }
}

function showDownloadLinkModal(url, filename){
  const bg = document.createElement('div');
  bg.className = 'modal-bg';
  bg.innerHTML = `
    <div class="modal" style="max-width:380px;text-align:center;">
      <h3 style="color:var(--navy);">Your PDF is ready</h3>
      <p class="lead" style="font-size:14px;">Tap the button below to save it.</p>
      <div class="btn-row" style="justify-content:center;">
        <button class="btn btn-ghost" id="pdf-modal-close">Close</button>
        <a class="btn btn-gold" style="text-decoration:none;display:inline-block;" href="${url}" download="${filename}" target="_blank" rel="noopener">Save PDF</a>
      </div>
    </div>`;
  document.body.appendChild(bg);
  bg.querySelector('#pdf-modal-close').onclick = ()=> bg.remove();
  bg.addEventListener('click', (e)=>{ if(e.target === bg) bg.remove(); });
}

function downloadPDF(entryOrElementId, filename){
  // Backward-compatible: accept either an entry object or (legacy) a DOM element id string
  let entry = entryOrElementId;
  if(typeof entryOrElementId === 'string'){
    entry = (staffViewEntryId && staffEntries.find(x=>x.id===staffViewEntryId)) || lastSubmittedEntry;
  }
  if(!entry){ toast('Could not find the record to export.'); return; }
  if(!window.jspdf){
    toast('PDF tools failed to load (check your internet connection) — try again in a moment.');
    return;
  }
  toast('Preparing PDF...');
  buildOfficialPDF(entry).then(pdf=>{
    const blob = pdf.output('blob');
    const url = URL.createObjectURL(blob);
    showDownloadLinkModal(url, filename);
  }).catch((err)=>{
    console.error(err);
    toast('Could not generate the PDF. Please try again.');
  });
}

function getImageDims(dataUrl){
  return new Promise((resolve)=>{
    if(!dataUrl){ resolve({w:1,h:1}); return; }
    const img = new Image();
    img.onload = ()=> resolve({w:img.naturalWidth||1, h:img.naturalHeight||1});
    img.onerror = ()=> resolve({w:1,h:1});
    img.src = dataUrl;
  });
}

async function buildOfficialPDF(e){
  const { jsPDF } = window.jspdf;
  const pdf = new jsPDF('p','mm','a4');
  const PAGE_W = 210, PAGE_H = 297;
  const MARGIN = 16;
  const CONTENT_W = PAGE_W - MARGIN*2;
  const HEADER_BOTTOM = 47;
  const FOOTER_TOP = 278;
  let y = HEADER_BOTTOM;
  const NAVY = [18,43,122];
  const INK = [27,31,42];
  const GRAY = [106,114,136];

  function drawHeader(){
    const hw = CONTENT_W;
    const hh = hw * (153/914);
    try{ pdf.addImage(LETTERHEAD_HEADER_IMG,'JPEG', MARGIN, 5, hw, hh); }catch(err){}
    pdf.setDrawColor(217,166,46);
    pdf.setLineWidth(0.6);
    pdf.line(0,36,PAGE_W,36);
  }

  function drawFooter(pageNum, totalPages){
    pdf.setDrawColor(216,222,236);
    pdf.setLineWidth(0.3);
    pdf.line(MARGIN, FOOTER_TOP, PAGE_W-MARGIN, FOOTER_TOP);
    const fw = 92;
    const fh = fw * (48/551);
    try{ pdf.addImage(LETTERHEAD_FOOTER_IMG,'JPEG', MARGIN, FOOTER_TOP+2, fw, fh); }catch(err){}
    pdf.setFont('helvetica','bold');
    pdf.setFontSize(8);
    pdf.setTextColor(INK[0],INK[1],INK[2]);
    pdf.text('Page ' + pageNum + ' of ' + totalPages, PAGE_W-MARGIN, FOOTER_TOP+7, {align:'right'});
  }


  function ensureSpace(needed){
    if(y + needed > FOOTER_TOP - 4){
      pdf.addPage();
      drawHeader();
      y = HEADER_BOTTOM;
    }
  }

  function sectionTitle(text){
    ensureSpace(10);
    pdf.setFillColor(238,241,251);
    pdf.rect(MARGIN, y, CONTENT_W, 7, 'F');
    pdf.setFont('helvetica','bold');
    pdf.setFontSize(10);
    pdf.setTextColor(NAVY[0],NAVY[1],NAVY[2]);
    pdf.text(text, MARGIN+2, y+5);
    y += 11;
  }

  function qaLine(label, value){
    const val = (value===undefined||value===null||value==='') ? '\u2014' : String(value);
    pdf.setFont('helvetica','bold');
    pdf.setFontSize(8);
    pdf.setTextColor(GRAY[0],GRAY[1],GRAY[2]);
    const labelLines = pdf.splitTextToSize(label.toUpperCase(), CONTENT_W);
    ensureSpace(labelLines.length*3.6 + 6);
    pdf.text(labelLines, MARGIN, y);
    y += labelLines.length*3.6 + 1;
    pdf.setFont('helvetica','normal');
    pdf.setFontSize(10.5);
    pdf.setTextColor(INK[0],INK[1],INK[2]);
    const valLines = pdf.splitTextToSize(val, CONTENT_W);
    ensureSpace(valLines.length*5);
    pdf.text(valLines, MARGIN, y);
    y += valLines.length*5 + 3;
    pdf.setDrawColor(238,240,246);
    pdf.setLineWidth(0.2);
    pdf.line(MARGIN, y-1.5, PAGE_W-MARGIN, y-1.5);
  }

  async function imageBlock(label, dataUrl, maxWmm){
    pdf.setFont('helvetica','bold');
    pdf.setFontSize(8);
    pdf.setTextColor(GRAY[0],GRAY[1],GRAY[2]);
    if(!dataUrl){
      ensureSpace(10);
      pdf.text(label.toUpperCase(), MARGIN, y);
      y += 4;
      pdf.setFont('helvetica','normal');
      pdf.setFontSize(10);
      pdf.setTextColor(INK[0],INK[1],INK[2]);
      pdf.text('\u2014 not provided \u2014', MARGIN, y);
      y += 6;
      return;
    }
    const dims = await getImageDims(dataUrl);
    let w = maxWmm, h = dims.h * (w/dims.w);
    const maxH = 70;
    if(h > maxH){ h = maxH; w = dims.w * (h/dims.h); }
    ensureSpace(h + 8);
    pdf.text(label.toUpperCase(), MARGIN, y);
    y += 4;
    let fmt = 'JPEG';
    if(dataUrl.startsWith('data:image/png')) fmt = 'PNG';
    try{
      pdf.setDrawColor(199,206,224);
      pdf.setLineWidth(0.3);
      pdf.rect(MARGIN, y, w, h);
      pdf.addImage(dataUrl, fmt, MARGIN, y, w, h);
    }catch(err){
      pdf.setFont('helvetica','italic');
      pdf.setFontSize(9);
      pdf.text('(image could not be embedded)', MARGIN, y+5);
    }
    y += h + 6;
  }

  drawHeader();

  // Title block
  pdf.setFont('helvetica','bold');
  pdf.setFontSize(13);
  pdf.setTextColor(NAVY[0],NAVY[1],NAVY[2]);
  pdf.text('OFFICIAL ENROLLMENT APPLICATION SUMMARY', MARGIN, y);
  y += 6;
  pdf.setFont('helvetica','normal');
  pdf.setFontSize(9);
  pdf.setTextColor(GRAY[0],GRAY[1],GRAY[2]);
  const submittedStr = e.submittedAt ? new Date(e.submittedAt).toLocaleString() : '\u2014';
  pdf.text('Batch ' + e.batch + '   \u00b7   Reference No: ' + e.id + '   \u00b7   Submitted: ' + submittedStr, MARGIN, y);
  y += 8;

  sectionTitle('I. Personal Information');
  qaLine('Full Name (Last, First, MI)', e.fullName);
  qaLine('Date of Birth', e.dob);
  qaLine('Complete Address', e.address);
  qaLine('Contact Number', e.contact);
  qaLine('Sex', e.sex);
  qaLine('Civil Status', e.civilStatus);
  qaLine('Nationality', e.nationality==='Other'? e.nationalityOther : e.nationality);
  qaLine('Religion', e.religion==='Other'? e.religionOther : e.religion);

  sectionTitle('II. Educational Background');
  qaLine('Highest Educational Attainment', e.education);
  qaLine('Prior TESDA-Accredited Training / NC Holder', e.hasNC);
  if(e.hasNC==='Yes'){
    qaLine('NC Level and Program', [e.ncProgram1,e.ncProgram2].filter(Boolean).join('; '));
  }

  sectionTitle('III. Program Selection');
  qaLine('Course / Program Name', e.program);
  qaLine('How did you learn about this program?', e.howLearned==='Other'? e.howLearnedOther : e.howLearned);

  sectionTitle('IV. Requirements');
  qaLine('Valid ID Type', e.idType);
  await imageBlock('Valid ID Upload', e.idFile, 70);
  await imageBlock('2x2 Picture', e.photoFile, 45);

  sectionTitle('V. Payment Information');
  qaLine('Mode of Payment', e.paymentMode);
  await imageBlock('Proof of Payment', e.paymentFile, 70);

  sectionTitle('VI. Consent & Certification');
  qaLine('Certification', e.certify ? 'I certify that the information provided is true and correct, and I agree to the policies stated herein.' : '\u2014');
  await imageBlock('Applicant Signature', e.signatureFile, 60);

  const totalPages = pdf.internal.getNumberOfPages();
  for(let i=1; i<=totalPages; i++){
    pdf.setPage(i);
    drawFooter(i, totalPages);
  }

  return pdf;
}

function exportExcel(){
  const rows = staffEntries.map(e=>({
    Batch: e.batch,
    'Full Name': e.fullName,
    'Date of Birth': e.dob,
    Address: e.address,
    Contact: e.contact,
    Sex: e.sex,
    'Civil Status': e.civilStatus,
    Nationality: e.nationality==='Other'?e.nationalityOther:e.nationality,
    Religion: e.religion==='Other'?e.religionOther:e.religion,
    'Highest Educational Attainment': e.education,
    'Prior NC Holder': e.hasNC,
    'NC Level/Program': [e.ncProgram1,e.ncProgram2].filter(Boolean).join('; '),
    Program: e.program,
    'How They Learned About PTCP': e.howLearned==='Other'?e.howLearnedOther:e.howLearned,
    'Valid ID Type': e.idType,
    'Payment Mode': e.paymentMode,
    'Submitted At': e.submittedAt,
    'Reference No.': e.id
  }));
  const ws = XLSX.utils.json_to_sheet(rows);
  const wb = XLSX.utils.book_new();
  XLSX.utils.book_append_sheet(wb, ws, 'Enrollees');
  XLSX.writeFile(wb, 'PTCP_Enrollees_Summary.xlsx');
}

async function refreshStaffData(){
  staffEntries = await listAllEntries();
  staffMeta = await getMeta();
}

/* ========================= ATTACH HANDLERS ========================= */
function attachHandlers(){
  // Landing
  const staffBtn = document.getElementById('staff-portal-btn');
  if(staffBtn) staffBtn.onclick = ()=>{ currentView='staffLogin'; render(); };

  const startBtn = document.getElementById('start-enroll');
  if(startBtn) startBtn.onclick = async ()=>{
    const draft = await loadDraft();
    if(draft && Object.keys(draft).length){
      const resume = await appConfirm('We found an enrollment form you started earlier. Continue where you left off?', 'Continue Draft', 'Start New');
      if(resume){
        formData = draft;
        toast('Draft restored.');
      } else {
        formData = {};
        await clearDraft();
      }
    } else {
      formData = {};
    }
    currentStepKey = 'privacy';
    currentView = 'form';
    render();
  };
  loadBatchStatus();

  // Form step inputs
  document.querySelectorAll('input[type=text], input[type=tel], input[type=date], textarea, select').forEach(inp=>{
    if(!inp.id || !inp.id.startsWith('f-')) return;
    inp.addEventListener('input', ()=>{
      const key = inp.id.slice(2);
      setField(key, inp.value);
    });
    inp.addEventListener('change', ()=>{
      const key = inp.id.slice(2);
      setField(key, inp.value);
      if(key==='nationality' || key==='religion' || key==='howLearned'){ /* handled by radios */ }
    });
  });
  document.querySelectorAll('input[type=radio]').forEach(r=>{
    r.addEventListener('change', ()=>{
      setField(r.name, r.value);
      render();
    });
  });
  document.querySelectorAll('input[type=checkbox]').forEach(c=>{
    if(!c.id || !c.id.startsWith('f-')) return;
    c.addEventListener('change', ()=>{
      const key = c.id.slice(2);
      setField(key, c.checked);
    });
  });
  document.querySelectorAll('select').forEach(s=>{
    if(!s.id || !s.id.startsWith('f-')) return;
    s.addEventListener('change', ()=>{
      const key = s.id.slice(2);
      setField(key, s.value);
    });
  });
  document.querySelectorAll('input[type=file]').forEach(f=>{
    f.addEventListener('change', (ev)=>{
      const key = f.getAttribute('data-upload');
      const file = ev.target.files[0];
      if(file) handleFileUpload(key, file);
    });
  });
  document.querySelectorAll('[data-clear]').forEach(btn=>{
    btn.addEventListener('click', (ev)=>{
      ev.preventDefault();
      const key = btn.getAttribute('data-clear');
      delete formData[key];
      queueAutosave();
      render();
    });
  });

  const backBtn = document.getElementById('btn-back');
  if(backBtn) backBtn.onclick = handleBack;
  const nextBtn = document.getElementById('btn-next');
  if(nextBtn) nextBtn.onclick = handleNext;

  // Thank you
  const pdfBtn = document.getElementById('btn-pdf');
  if(pdfBtn) pdfBtn.onclick = ()=> downloadPDF(lastSubmittedEntry, 'PTCP_Enrollment_'+(lastSubmittedEntry?lastSubmittedEntry.id:'form')+'.pdf');
  const newEntryBtn = document.getElementById('btn-newentry');
  if(newEntryBtn) newEntryBtn.onclick = ()=>{ currentView='landing'; render(); };

  // Staff login
  const staffLoginBtn = document.getElementById('btn-staff-login');
  if(staffLoginBtn) staffLoginBtn.onclick = async ()=>{
    const val = document.getElementById('f-staffPass').value;
    if(val === STAFF_PASSWORD){
      staffAuthed = true;
      await refreshStaffData();
      staffFilterBatch='all'; staffSearch=''; staffViewEntryId=null;
      currentView = 'staffDashboard';
      render();
    } else {
      document.getElementById('staff-login-err').textContent = 'Incorrect password. Please try again.';
    }
  };
  const staffCancelBtn = document.getElementById('btn-staff-cancel');
  if(staffCancelBtn) staffCancelBtn.onclick = ()=>{ currentView='landing'; render(); };
  const staffPassInp = document.getElementById('f-staffPass');
  if(staffPassInp) staffPassInp.addEventListener('keydown', (e)=>{ if(e.key==='Enter'){ staffLoginBtn && staffLoginBtn.click(); } });
  const showPassToggle = document.getElementById('toggle-staff-pass');
  if(showPassToggle) showPassToggle.addEventListener('change', ()=>{
    if(staffPassInp) staffPassInp.type = showPassToggle.checked ? 'text' : 'password';
  });

  // Staff dashboard
  const logoutBtn = document.getElementById('btn-staff-logout');
  if(logoutBtn) logoutBtn.onclick = ()=>{ staffAuthed=false; currentView='landing'; render(); };
  const batchFilter = document.getElementById('staff-batch-filter');
  if(batchFilter) batchFilter.onchange = (e)=>{ staffFilterBatch = e.target.value; render(); };
  const searchInp = document.getElementById('staff-search');
  if(searchInp) searchInp.oninput = (e)=>{ staffSearch = e.target.value; render(); };
  const exportBtn = document.getElementById('btn-export-excel');
  if(exportBtn) exportBtn.onclick = exportExcel;
  const refreshBtn = document.getElementById('btn-refresh');
  if(refreshBtn) refreshBtn.onclick = async ()=>{ await refreshStaffData(); render(); toast('Refreshed.'); };

  document.querySelectorAll('[data-view]').forEach(btn=>{
    btn.addEventListener('click', ()=>{ staffViewEntryId = btn.getAttribute('data-view'); render(); });
  });
  document.querySelectorAll('[data-delete]').forEach(btn=>{
    btn.addEventListener('click', async ()=>{
      const id = btn.getAttribute('data-delete');
      const proceed = await appConfirm('Delete this enrollment record? This cannot be undone.', 'Delete', 'Cancel');
      if(proceed){
        const result = await deleteEntryRecord(id);
        const stillThere = await safeGet('entry:'+id, true);
        if(result.ok && !stillThere){
          staffEntries = staffEntries.filter(x=>x.id!==id);
          render();
          toast('Record deleted.');
        } else {
          toast('Delete failed: ' + (result.error || 'record still present after delete') );
        }
      }
    });
  });
  const backListBtn = document.getElementById('btn-staff-back-list');
  if(backListBtn) backListBtn.onclick = ()=>{ staffViewEntryId=null; render(); };
  const viewPdfBtn = document.getElementById('btn-view-pdf');
  if(viewPdfBtn) viewPdfBtn.onclick = ()=>{
    const e = staffEntries.find(x=>x.id===staffViewEntryId);
    downloadPDF(e, 'PTCP_Enrollment_'+(e?e.id:'record')+'.pdf');
  };
  const viewDeleteBtn = document.getElementById('btn-view-delete');
  if(viewDeleteBtn) viewDeleteBtn.onclick = async ()=>{
    const id = viewDeleteBtn.getAttribute('data-id');
    const proceed = await appConfirm('Delete this enrollment record? This cannot be undone.', 'Delete', 'Cancel');
    if(proceed){
      const result = await deleteEntryRecord(id);
      const stillThere = await safeGet('entry:'+id, true);
      if(result.ok && !stillThere){
        staffEntries = staffEntries.filter(x=>x.id!==id);
        staffViewEntryId = null;
        render();
        toast('Record deleted.');
      } else {
        toast('Delete failed: ' + (result.error || 'record still present after delete') );
      }
    }
  };
}

async function loadBatchStatus(){
  const meta = await getMeta();
  landingMeta = meta;
  const el = document.getElementById('batch-status');
  if(el){
    const slotsLeft = BATCH_SIZE - meta.count;
    el.innerHTML = `<span class="batch-pill ${slotsLeft<=0?'full-pill':''}">Now enrolling: Batch ${meta.batch} &middot; ${slotsLeft>0?slotsLeft+' slot(s) left':'Batch full — next submission opens Batch '+(meta.batch+1)}</span>`;
  }
}

/* ========================= INIT ========================= */
render();
</script>
